const KCAL_POR_MIN = {

/* ================== UTILS ================== */
const pad = n => String(n).padStart(2,'0');
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
};
const parseDate = s => {
  if (!s) return null;
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
};
const formatBR = s => {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
};
const addDays = (s, n) => {
  const d = parseDate(s);
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
};
const daysBetween = (a,b) => Math.round((parseDate(b) - parseDate(a)) / 86400000);

const calcIMC = p => p / (ALTURA * ALTURA);
const classIMC = imc => {
  if (imc < 18.5) return { label:'Abaixo', color:'text-blue-500', bg:'bg-blue-100' };
  if (imc < 25)   return { label:'Normal', color:'text-green-600', bg:'bg-green-100' };
  if (imc < 30)   return { label:'Sobrepeso', color:'text-yellow-600', bg:'bg-yellow-100' };
  if (imc < 35)   return { label:'Obesidade I', color:'text-orange-600', bg:'bg-orange-100' };
  if (imc < 40)   return { label:'Obesidade II', color:'text-red-600', bg:'bg-red-100' };
  return { label:'Obesidade III', color:'text-red-800', bg:'bg-red-200' };
};
const kcalTreino = (tipo, dur) => Math.round((KCAL_POR_MIN[tipo] || 5) * dur);

const monthKey = s => s?.substring(0,7);
const monthName = mk => {
  const [y,m] = mk.split('-');
  const names = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${names[parseInt(m)-1]} ${y}`;
};
const daysOfMonth = mk => {
  const [y,m] = mk.split('-').map(Number);
  const last = new Date(y, m, 0).getDate();
  const out = [];
  for (let d=1; d<=last; d++) out.push(`${y}-${pad(m)}-${pad(d)}`);
  return out;
};
const groupByMonth = (arr, key='data') => {
  const out = {};
  arr.forEach(x => {
    const mk = monthKey(x[key]);
    if (!out[mk]) out[mk] = [];
    out[mk].push(x);
  });
  return out;
};
const sortedMonthKeys = obj => Object.keys(obj).sort((a,b) => b.localeCompare(a));

/* ================== DATA HOOK ================== */
function useJornadaData() {
  const [loading, setLoading] = useState(true);
  const [pesos,       setPesos]       = useState([]);
  const [treinos,     setTreinos]     = useState([]);
  const [hidratacao,  setHidratacao]  = useState([]);
  const [medicacao,   setMedicacao]   = useState([]);
  const [suplementos, setSuplementos] = useState([]);
  const [marcadores,  setMarcadores]  = useState([]);
  const [analises,    setAnalises]    = useState([]);
  const [error, setError] = useState(null);

  const loadAll = useCallback(async () => {
    setLoading(true);
    try {
      const [p,t,h,m,s,mc,a] = await Promise.all([
        sb.from('jornada_pesos').select('*').order('data', { ascending: true }),
        sb.from('jornada_treinos').select('*').order('data', { ascending: true }),
        sb.from('jornada_hidratacao').select('*').order('data', { ascending: true }),
        sb.from('jornada_medicacao').select('*').order('data', { ascending: true }),
        sb.from('jornada_suplementos').select('*').order('data', { ascending: true }),
        sb.from('jornada_marcadores').select('*'),
        sb.from('jornada_analises_ia').select('*').order('created_at', { ascending: false })
      ]);
      if (p.error) throw p.error;
      setPesos(p.data || []);
      setTreinos(t.data || []);
      setHidratacao(h.data || []);
      setMedicacao(m.data || []);
      setSuplementos(s.data || []);
      setMarcadores(mc.data || []);
      setAnalises(a.data || []);
      setError(null);
    } catch (e) {
      console.error(e);
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  // CRUD helpers
  const crud = (table, setter) => ({
    async add(row) {
      const { data, error } = await sb.from(table).insert(row).select().single();
      if (error) { alert('Erro: '+error.message); return null; }
      setter(prev => [...prev, data].sort((a,b)=>a.data.localeCompare(b.data)));
      return data;
    },
    async update(id, patch) {
      const { data, error } = await sb.from(table).update(patch).eq('id', id).select().single();
      if (error) { alert('Erro: '+error.message); return null; }
      setter(prev => prev.map(r => r.id===id ? data : r).sort((a,b)=>a.data.localeCompare(b.data)));
      return data;
    },
    async remove(id) {
      const { error } = await sb.from(table).delete().eq('id', id);
      if (error) { alert('Erro: '+error.message); return false; }
      setter(prev => prev.filter(r => r.id !== id));
      return true;
    }
  });

  const pesosApi       = useMemo(() => crud('jornada_pesos',       setPesos),       []);
  const treinosApi     = useMemo(() => crud('jornada_treinos',     setTreinos),     []);
  const hidratacaoApi  = useMemo(() => crud('jornada_hidratacao',  setHidratacao),  []);
  const medicacaoApi   = useMemo(() => crud('jornada_medicacao',   setMedicacao),   []);
  const suplementosApi = useMemo(() => crud('jornada_suplementos', setSuplementos), []);

  // Marcadores: set/unset per (data, categoria)
  const marcadoresApi = useMemo(() => ({
    async set(data, categoria, marcador) {
      const existing = marcadores.find(m => m.data===data && m.categoria===categoria);
      if (existing) {
        const { data: d, error } = await sb.from('jornada_marcadores').update({ marcador }).eq('id', existing.id).select().single();
        if (error) return;
        setMarcadores(prev => prev.map(m => m.id===existing.id ? d : m));
      } else {
        const { data: d, error } = await sb.from('jornada_marcadores').insert({ data, categoria, marcador }).select().single();
        if (error) return;
        setMarcadores(prev => [...prev, d]);
      }
    },
    async unset(data, categoria) {
      const existing = marcadores.find(m => m.data===data && m.categoria===categoria);
      if (!existing) return;
      await sb.from('jornada_marcadores').delete().eq('id', existing.id);
      setMarcadores(prev => prev.filter(m => m.id !== existing.id));
    },
    get(data, categoria) {
      const m = marcadores.find(m => m.data===data && m.categoria===categoria);
      return m?.marcador || null;
    }
  }), [marcadores]);

  const analisesApi = useMemo(() => ({
    async add(conteudo) {
      const { data, error } = await sb.from('jornada_analises_ia').insert({ conteudo, data: todayStr() }).select().single();
      if (error) { alert('Erro: '+error.message); return null; }
      setAnalises(prev => [data, ...prev]);
      return data;
    },
    async remove(id) {
      await sb.from('jornada_analises_ia').delete().eq('id', id);
      setAnalises(prev => prev.filter(a => a.id !== id));
    }
  }), []);

  return {
    loading, error, reload: loadAll,
    pesos, treinos, hidratacao, medicacao, suplementos, marcadores, analises,
    pesosApi, treinosApi, hidratacaoApi, medicacaoApi, suplementosApi, marcadoresApi, analisesApi
  };
}

/* ================== TAB: VISÃO GERAL ================== */
function VisaoGeral({ data, setTab, onCheckin }) {
  const { pesos, treinos, hidratacao, medicacao, suplementos } = data;

  const pesoAtual = pesos.length ? pesos[pesos.length-1].peso : PESO_INICIAL;
  const kgPerdidos = (PESO_INICIAL - pesoAtual).toFixed(1);
  const imcAtual = calcIMC(pesoAtual);
  const cls = classIMC(imcAtual);
  const imcIni = calcIMC(PESO_INICIAL);
  const imcMeta = calcIMC(PESO_META);

  // Projeção linear
  const projecao = useMemo(() => {
    if (pesos.length < 2) return null;
    const first = pesos[0];
    const last = pesos[pesos.length-1];
    const dias = daysBetween(first.data, last.data);
    if (dias <= 0) return null;
    const kgPorDia = (first.peso - last.peso) / dias;
    if (kgPorDia <= 0) return { data: null, kgSemana: 0 };
    const kgRestante = last.peso - PESO_META;
    if (kgRestante <= 0) return { data: last.data, kgSemana: kgPorDia * 7 };
    const diasRest = Math.ceil(kgRestante / kgPorDia);
    return { data: addDays(last.data, diasRest), kgSemana: kgPorDia * 7 };
  }, [pesos]);

  // Gráfico peso com tendência
  const chartData = useMemo(() => {
    if (!pesos.length) return [];
    const pontos = pesos.map(p => ({
      data: p.data,
      label: formatBR(p.data).substring(0,5),
      peso: parseFloat(p.peso),
      tendencia: null
    }));
    if (projecao?.data && pesos.length >= 2) {
      const first = pesos[0], last = pesos[pesos.length-1];
      const dias = daysBetween(first.data, last.data);
      if (dias > 0) {
        const slope = (last.peso - first.peso) / dias;
        // Add tendencia for all existing points
        pontos.forEach(p => { p.tendencia = parseFloat((parseFloat(first.peso) + slope * daysBetween(first.data, p.data)).toFixed(2)); });
        // Add future points to projeção
        if (projecao.data !== last.data) {
          const futuros = [];
          let current = last.data;
          while (current < projecao.data) {
            current = addDays(current, 7);
            if (current > projecao.data) current = projecao.data;
            futuros.push({
              data: current,
              label: formatBR(current).substring(0,5),
              peso: null,
              tendencia: parseFloat((parseFloat(first.peso) + slope * daysBetween(first.data, current)).toFixed(2))
            });
          }
          return [...pontos, ...futuros];
        }
      }
    }
    return pontos;
  }, [pesos, projecao]);

  // Água hoje
  const hidratHoje = hidratacao.filter(h => h.data === todayStr()).reduce((s,h) => s + h.ml, 0);
  const pctAgua = Math.min(100, (hidratHoje / META_HIDRATACAO) * 100);

  // Treinos total + kcal
  const totalTreinos = treinos.length;
  const totalKcal = treinos.reduce((s,t) => s + kcalTreino(t.tipo, t.duracao), 0);

  // Próxima dose
  const ultimaDose = medicacao[medicacao.length-1];
  const proxDose = ultimaDose ? addDays(ultimaDose.data, 7) : null;

  // Suplementos ativos (únicos por nome)
  const suplementosAtivos = [...new Set(suplementos.map(s => s.nome))];

  return (
    <div className="space-y-3 pb-4">
      <div className="grid grid-cols-2 gap-3">
        <Card className="text-center">
          <div className="text-xs text-gray-500">Peso atual</div>
          <div className="text-3xl font-bold text-rose-600">{parseFloat(pesoAtual).toFixed(1)}<span className="text-sm">kg</span></div>
        </Card>
        <Card className="text-center">
          <div className="text-xs text-gray-500">Perdidos</div>
          <div className={`text-3xl font-bold ${kgPerdidos>0 ? 'text-green-600' : 'text-gray-400'}`}>{kgPerdidos>0?'-':''}{Math.abs(kgPerdidos)}<span className="text-sm">kg</span></div>
        </Card>
        <Card className="text-center">
          <div className="text-xs text-gray-500">IMC atual</div>
          <div className={`text-3xl font-bold ${cls.color}`}>{imcAtual.toFixed(1)}</div>
          <div className={`text-xs ${cls.color}`}>{cls.label}</div>
        </Card>
        <Card className="text-center">
          <div className="text-xs text-gray-500">Próxima dose</div>

/* ================== TAB: SEMANAS ================== */
function Semanas({ data }) {
  const { pesos, treinos, hidratacao } = data;

  const semanas = useMemo(() => {
    if (!pesos.length) return [];
    // Agrupa por semana (segunda a domingo)
    const getWeekKey = s => {
      const d = parseDate(s);
      const day = d.getDay(); // 0 = dom
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    };
    const mapa = {};
    pesos.forEach(p => {
      const wk = getWeekKey(p.data);
      if (!mapa[wk]) mapa[wk] = { inicio: wk, pesos: [], treinos: 0, hidrat: [] };
      mapa[wk].pesos.push(p);
    });
    treinos.forEach(t => {
      const wk = getWeekKey(t.data);
      if (!mapa[wk]) mapa[wk] = { inicio: wk, pesos: [], treinos: 0, hidrat: [] };
      mapa[wk].treinos++;
    });
    hidratacao.forEach(h => {
      const wk = getWeekKey(h.data);
      if (!mapa[wk]) mapa[wk] = { inicio: wk, pesos: [], treinos: 0, hidrat: [] };
      mapa[wk].hidrat.push(h.ml);
    });
    return Object.values(mapa)
      .map(s => {
        const pesoIni = s.pesos.length ? parseFloat(s.pesos[0].peso) : null;
        const pesoFim = s.pesos.length ? parseFloat(s.pesos[s.pesos.length-1].peso) : null;
        const variacao = pesoIni!=null && pesoFim!=null ? pesoFim - pesoIni : 0;
        const imcFinal = pesoFim ? calcIMC(pesoFim) : null;
        const hidratMedia = s.hidrat.length ? Math.round(s.hidrat.reduce((a,b)=>a+b,0)/s.hidrat.length) : 0;
        return { ...s, pesoIni, pesoFim, variacao, imcFinal, hidratMedia };
      })
      .sort((a,b) => a.inicio.localeCompare(b.inicio));
  }, [pesos, treinos, hidratacao]);

  const chartData = semanas.map((s,i) => ({
    label: `S${i+1}`,
    variacao: parseFloat(s.variacao.toFixed(2))
  }));

  return (
    <div className="space-y-3 pb-4">
      {chartData.length > 0 && (
        <Card>
          <div className="text-sm font-medium text-gray-700 mb-2">Variação semanal (kg)</div>
          <div style={{ width: '100%', height: 200 }}>
            <R.ResponsiveContainer>
              <R.BarChart data={chartData} margin={{ top: 5, right: 10, left: -20, bottom: 0 }}>
                <R.CartesianGrid strokeDasharray="3 3" stroke="#fce7f3"/>
                <R.XAxis dataKey="label" tick={{ fontSize: 11 }}/>
                <R.YAxis tick={{ fontSize: 10 }}/>
                <R.Tooltip formatter={(v) => `${v} kg`}/>
                <R.Bar dataKey="variacao">
                  {chartData.map((d,i) => (
                    <R.Cell key={i} fill={d.variacao < 0 ? '#10b981' : d.variacao > 0 ? '#ef4444' : '#9ca3af'}/>
                  ))}
                </R.Bar>
              </R.BarChart>
            </R.ResponsiveContainer>
          </div>
        </Card>
      )}
      {semanas.map((s,i) => {
        const cor = s.variacao < 0 ? 'text-green-600' : s.variacao > 0 ? 'text-red-500' : 'text-gray-500';
        const bgCor = s.variacao < 0 ? 'bg-green-50 border-green-200' : s.variacao > 0 ? 'bg-red-50 border-red-200' : 'bg-gray-50 border-gray-200';
        return (
          <div key={s.inicio} className={`rounded-2xl p-4 border ${bgCor}`}>
            <div className="flex justify-between items-start mb-2">
              <div>
                <div className="font-semibold text-gray-800">Semana {i+1}</div>
                <div className="text-xs text-gray-500">desde {formatBR(s.inicio)}</div>
              </div>
              <div className={`text-2xl font-bold ${cor}`}>
                {s.variacao > 0 ? '+' : ''}{s.variacao.toFixed(2)}kg
              </div>
            </div>
            <div className="grid grid-cols-2 gap-2 text-xs text-gray-600">
              <div>⚖️ {s.pesoIni != null ? s.pesoIni.toFixed(1) : '—'} → {s.pesoFim != null ? s.pesoFim.toFixed(1) : '—'} kg</div>
              <div>🏋️ {s.treinos} treino{s.treinos!==1?'s':''}</div>
              <div>💧 {s.hidratMedia} ml/dia</div>
              <div>IMC {s.imcFinal?.toFixed(1) || '—'}</div>
            </div>
          </div>
        );
      })}
      {semanas.length === 0 && <div className="text-center text-gray-500 py-8">Sem dados ainda</div>}
    </div>
  );
}

/* ================== TAB: PESO ================== */
function PesoTab({ data }) {
  const { pesos, pesosApi, marcadoresApi } = data;
  const [form, setForm] = useState({ data: todayStr(), peso: '' });
  const [editing, setEditing] = useState(null);
  const [calMes, setCalMes] = useState(() => {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
  });

  const grupos = useMemo(() => groupByMonth(pesos), [pesos]);
  const meses = useMemo(() => sortedMonthKeys(grupos), [grupos]);

  async function salvar(e) {
    e.preventDefault();
    if (!form.peso) return;
    const peso = parseFloat(form.peso.replace(',','.'));
    if (editing) {
      await pesosApi.update(editing, { data: form.data, peso });
      setEditing(null);
    } else {
      await pesosApi.add({ data: form.data, peso });
    }
    setForm({ data: todayStr(), peso: '' });
  }

  function startEdit(p) {
    setEditing(p.id);
    setForm({ data: p.data, peso: String(p.peso) });
  }

  // Calendário mensal
  function CalendarioMes() {
    const [y, m] = calMes.split('-').map(Number);
    const first = new Date(y, m-1, 1);
    const last = new Date(y, m, 0);
    const dias = [];
    const firstDay = first.getDay();
    for (let i=0; i<firstDay; i++) dias.push(null);
    for (let d=1; d<=last.getDate(); d++) dias.push(d);

    const temRegistro = d => pesos.some(p => p.data === `${y}-${pad(m)}-${pad(d)}`);
    const isHoje = d => `${y}-${pad(m)}-${pad(d)}` === todayStr();

    function navMes(delta) {
      const nd = new Date(y, m-1+delta, 1);
      setCalMes(`${nd.getFullYear()}-${pad(nd.getMonth()+1)}`);
    }

    return (
      <Card>
        <div className="flex items-center justify-between mb-3">
          <button onClick={() => navMes(-1)} className="p-1 rounded hover:bg-rose-50"><ILeft className="w-4 h-4 text-rose-500"/></button>
          <div className="text-sm font-semibold text-gray-700 capitalize">{monthName(calMes)}</div>
          <button onClick={() => navMes(1)} className="p-1 rounded hover:bg-rose-50"><IRight className="w-4 h-4 text-rose-500"/></button>
        </div>
        <div className="grid grid-cols-7 gap-1 text-center text-xs text-gray-400 mb-1">
          {['D','S','T','Q','Q','S','S'].map((d,i) => <div key={i}>{d}</div>)}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {dias.map((d,i) => {
            if (d === null) return <div key={i}/>;
            const hoje = isHoje(d);
            const tem = temRegistro(d);
            return (
              <div key={i} className={`aspect-square flex items-center justify-center text-xs rounded-lg
                ${tem ? 'bg-green-100 text-green-700 font-bold' : 'bg-gray-50 text-gray-400'}
                ${hoje ? 'ring-2 ring-rose-400' : ''}`}>{d}</div>
            );
          })}
        </div>
      </Card>
    );
  }

  return (
    <div className="space-y-3 pb-4">
      {/* Form */}
      <Card>
        <form onSubmit={salvar} className="flex gap-2 items-end">
          <div className="flex-1">
            <label className="text-xs text-gray-500">Data</label>
            <DateInput value={form.data} onChange={v => setForm({...form, data: v})} className="w-full"/>
          </div>
          <div className="flex-1">
            <label className="text-xs text-gray-500">Peso (kg)</label>
            <NumberInput value={form.peso} onChange={v => setForm({...form, peso: v})} placeholder="ex: 85.3" className="w-full"/>
          </div>
          <button type="submit" className="bg-rose-500 text-white px-4 py-2 rounded-xl font-semibold active:scale-95">
            {editing ? 'Salvar' : '+ Add'}
          </button>
        </form>
        {editing && (
          <button onClick={() => { setEditing(null); setForm({ data: todayStr(), peso: '' }); }}
            className="mt-2 text-xs text-gray-500">cancelar edição</button>
        )}
      </Card>

      <CalendarioMes/>

      {/* Registros agrupados por mês */}
      <div>
        {meses.map(mk => {
          const regs = grupos[mk];
          const primeiro = regs[0];
          const todosDias = daysOfMonth(mk).filter(d => d >= primeiro.data);
          const hoje = todayStr();
          const diasPassados = todosDias.filter(d => d <= hoje);
          const diasSem = diasPassados.filter(d => !regs.some(r => r.data === d)).length;

          return (
            <MesAccordion key={mk} mk={mk} total={regs.length} diasSem={diasSem}>
              <div className="space-y-1">
                {todosDias.map(d => {
                  const reg = regs.find(r => r.data === d);
                  const isFuturo = d > hoje;
                  const marcador = marcadoresApi.get(d, 'peso');
                  if (reg) {
                    const isEditing = editing === reg.id;
                    return (
                      <div key={d} className="flex items-center justify-between bg-rose-50/50 rounded-lg px-3 py-2">
                        <div className="flex items-center gap-2">
                          <span className="text-xs text-gray-500 w-16">{formatBR(d).substring(0,5)}</span>
                          <span className="font-semibold text-rose-700">⚖️ {parseFloat(reg.peso).toFixed(1)} kg</span>
                        </div>
                        <div className="flex gap-1">
                          <button onClick={() => startEdit(reg)} className="p-1 text-gray-500 hover:text-rose-500"><IEdit className="w-4 h-4"/></button>
                          <button onClick={() => { if (confirm('Excluir?')) pesosApi.remove(reg.id); }} className="p-1 text-gray-500 hover:text-red-500"><ITrash className="w-4 h-4"/></button>
                        </div>
                      </div>
                    );
                  }
                  if (isFuturo) {
                    return (
                      <div key={d} className="flex items-center justify-between px-3 py-1 opacity-40">
                        <span className="text-xs text-gray-400 w-16">{formatBR(d).substring(0,5)}</span>
                        <span className="text-xs text-gray-300">—</span>
                      </div>
                    );
                  }
                  return (
                    <div key={d} className="flex items-center justify-between px-3 py-1">
                      <span className="text-xs text-gray-400 w-16">{formatBR(d).substring(0,5)}</span>
                      <div className="flex items-center gap-2">
                        {marcador && <span className="text-xs">{MARCADORES[marcador].emoji}</span>}
                        {!marcador && <span className="text-red-400 text-sm">❌</span>}
                        <button onClick={() => setForm({ data: d, peso: '' })} className="text-xs px-2 py-0.5 rounded-lg bg-rose-100 text-rose-600 hover:bg-rose-200">+ Add</button>
                        <MarcadorMenu current={marcador}
                          onSelect={k => marcadoresApi.set(d, 'peso', k)}
                          onClear={() => marcadoresApi.unset(d, 'peso')}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </MesAccordion>
          );
        })}
      </div>
    </div>
  );
}

function TreinosTab({ data }) {

  const [editing, setEditing] = useState(null);
  const [showOutroDur, setShowOutroDur] = useState(false);
  const [showOutroTipo, setShowOutroTipo] = useState(false);

  const grupos = useMemo(() => groupByMonth(treinos), [treinos]);
  const meses = useMemo(() => sortedMonthKeys(grupos), [grupos]);

  async function salvar(e) {
    e.preventDefault();
    const tipo = showOutroTipo ? form.tipoOutro : form.tipo;
    if (!tipo || !form.duracao) return;
    const row = { data: form.data, tipo, duracao: parseInt(form.duracao) };
    if (editing) {
      await treinosApi.update(editing, row);
      setEditing(null);
    } else {
      await treinosApi.add(row);
    }

  }

/* ================== TAB: HIDRATAÇÃO ================== */
function HidratacaoTab({ data }) {
  const { hidratacao, hidratacaoApi, marcadoresApi } = data;
  const [form, setForm] = useState({ data: todayStr(), ml: '' });
  const [editing, setEditing] = useState(null);
  const [flash, setFlash] = useState(null);

  const grupos = useMemo(() => groupByMonth(hidratacao), [hidratacao]);
  const meses = useMemo(() => sortedMonthKeys(grupos), [grupos]);

  async function salvar(e) {
    e.preventDefault();
    if (!form.ml) return;
    const ml = parseInt(form.ml);
    if (editing) {
      await hidratacaoApi.update(editing, { data: form.data, ml });
      setEditing(null);
    } else {
      await hidratacaoApi.add({ data: form.data, ml });
      setFlash(ml);
      setTimeout(() => setFlash(null), 1200);
    }
    setForm({ data: todayStr(), ml: '' });
  }

  async function quickAdd(ml) {
    await hidratacaoApi.add({ data: todayStr(), ml });
    setFlash(ml);
    setTimeout(() => setFlash(null), 1200);
  }

  const hidratHoje = hidratacao.filter(h => h.data === todayStr()).reduce((s,h) => s + h.ml, 0);
  const pct = Math.min(100, (hidratHoje / META_HIDRATACAO) * 100);

  function barColor(ml) {
    const p = ml / META_HIDRATACAO;
    if (p < 0.7) return 'bg-orange-400';
    if (p < 1) return 'bg-sky-500';
    return 'bg-green-500';
  }

  return (
    <div className="space-y-3 pb-4">
      {/* Progresso hoje */}
      <Card>
        <div className="flex justify-between text-sm mb-2">
          <span className="font-medium text-gray-700">💧 Hoje</span>
          <span className="text-rose-600 font-semibold">{hidratHoje}ml / {META_HIDRATACAO}ml</span>
        </div>
        <div className="h-4 bg-rose-100 rounded-full overflow-hidden">
          <div className={`h-full transition-all ${barColor(hidratHoje)}`} style={{ width: `${pct}%` }}/>
        </div>
      </Card>

      {/* Form */}
      <Card>
        <form onSubmit={salvar} className="space-y-3">
          <DateInput value={form.data} onChange={v => setForm({...form, data: v})} className="w-full"/>
          <NumberInput step="1" value={form.ml} onChange={v => setForm({...form, ml: v})} placeholder="ml" className="w-full"/>
          <div className="flex gap-2 flex-wrap">
            <span className="text-xs text-gray-500 self-center">Definir:</span>
            {[500,1000,1500].map(v => (
              <button key={v} type="button" onClick={() => setForm({...form, ml: String(v)})}
                className="px-3 py-1.5 rounded-xl text-sm bg-sky-100 text-sky-700">{v>=1000 ? `${v/1000}L` : `${v}ml`}</button>
            ))}
          </div>
          <div className="flex gap-2 flex-wrap">
            <span className="text-xs text-gray-500 self-center">+ Hoje:</span>
            {[500,1000,1500].map(v => (
              <button key={v} type="button" onClick={() => quickAdd(v)}
                className="px-3 py-1.5 rounded-xl text-sm bg-green-100 text-green-700">+{v>=1000?`${v/1000}L`:`${v}ml`}</button>
            ))}
          </div>
          <button type="submit" className="w-full bg-rose-500 text-white py-2 rounded-xl font-semibold active:scale-95">
            {editing ? 'Salvar' : '+ Registrar'}
          </button>
          {editing && <button type="button" onClick={()=>{ setEditing(null); setForm({data: todayStr(), ml:''}); }} className="text-xs text-gray-500 w-full text-center">cancelar</button>}
        </form>
      </Card>

      {flash && (
        <div className="fixed top-20 left-1/2 -translate-x-1/2 bg-sky-500 text-white px-5 py-3 rounded-2xl shadow-xl z-50 animate-flash font-semibold">
          +{flash}ml registrado! 💧
        </div>
      )}

      {/* Lista por mês */}
      {meses.map(mk => {
        const regs = grupos[mk];
        // Agrupar por dia
        const porDia = {};
        regs.forEach(r => {
          if (!porDia[r.data]) porDia[r.data] = { total: 0, items: [] };
          porDia[r.data].total += r.ml;
          porDia[r.data].items.push(r);
        });
        const todosDias = daysOfMonth(mk);
        const hoje = todayStr();
        const diasSem = todosDias.filter(d => d <= hoje && !porDia[d]).length;
        return (
          <MesAccordion key={mk} mk={mk} total={Object.keys(porDia).length} diasSem={diasSem}>
            <div className="space-y-1">
              {todosDias.map(d => {
                const dia = porDia[d];
                const isFuturo = d > hoje;
                const marcador = marcadoresApi.get(d, 'hidratacao');
                if (dia) {
                  const p = Math.min(100, (dia.total/META_HIDRATACAO)*100);
                  return (
                    <div key={d} className="bg-sky-50/60 rounded-lg px-3 py-2">
                      <div className="flex items-center justify-between mb-1">
                        <div className="flex items-center gap-2 text-sm">
                          <span className="text-xs text-gray-500 w-16">{formatBR(d).substring(0,5)}</span>
                          <span className="font-semibold text-sky-700">💧 {dia.total}ml</span>
                          <span className="text-xs text-gray-500">{Math.round(p)}%</span>
                        </div>
                        {dia.items.length === 1 && (
                          <div className="flex gap-1">
                            <button onClick={() => { setEditing(dia.items[0].id); setForm({ data: dia.items[0].data, ml: String(dia.items[0].ml) }); }} className="p-1 text-gray-500 hover:text-rose-500"><IEdit className="w-4 h-4"/></button>
                            <button onClick={() => { if (confirm('Excluir?')) hidratacaoApi.remove(dia.items[0].id); }} className="p-1 text-gray-500 hover:text-red-500"><ITrash className="w-4 h-4"/></button>
                          </div>
                        )}
                      </div>
                      <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden ml-16">
                        <div className={`h-full ${barColor(dia.total)}`} style={{ width: `${p}%` }}/>
                      </div>
                    </div>
                  );
                }
                if (isFuturo) return <div key={d} className="flex px-3 py-1 opacity-40"><span className="text-xs text-gray-400 w-16">{formatBR(d).substring(0,5)}</span><span className="text-xs">—</span></div>;
                return (
                  <div key={d} className="flex items-center justify-between px-3 py-1">
                    <span className="text-xs text-gray-400 w-16">{formatBR(d).substring(0,5)}</span>
                    <div className="flex items-center gap-2">
                      {marcador && <span className="text-xs">{MARCADORES[marcador].emoji}</span>}
                      {!marcador && <span className="text-red-400 text-sm">❌</span>}
                      <button onClick={() => setForm({...form, data: d})} className="text-xs px-2 py-0.5 rounded-lg bg-rose-100 text-rose-600 hover:bg-rose-200">+ Add</button>
                      <MarcadorMenu current={marcador}
                        onSelect={k => marcadoresApi.set(d, 'hidratacao', k)}
                        onClear={() => marcadoresApi.unset(d, 'hidratacao')}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </MesAccordion>
        );
      })}
    </div>
  );
}

/* ================== TAB: ANÁLISE IA ================== */
function AnaliseIATab({ data }) {
  const { pesos, treinos, hidratacao, medicacao, suplementos, analises, analisesApi } = data;
  const [apiKey, setApiKey] = useState(() => {
    try { return sessionStorage.getItem('anthropic_key') || ''; } catch { return ''; }
  });
  const [loading, setLoading] = useState(false);
  const [erro, setErro] = useState(null);

  function saveKey(k) {
    setApiKey(k);
    try { sessionStorage.setItem('anthropic_key', k); } catch {}
  }

  async function gerar() {
    if (!apiKey) { alert('Informe sua API key da Anthropic'); return; }
    setLoading(true); setErro(null);
    try {
      const resumo = {
        pesos: pesos.slice(-7),
        treinos: treinos.slice(-7),
        hidratacao: hidratacao.slice(-7),
        medicacao: medicacao.slice(-7),
        suplementos: suplementos.slice(-7),
        meta: { inicial: PESO_INICIAL, atual: pesos[pesos.length-1]?.peso, objetivo: PESO_META }
      };
      const prompt = `Você é uma coach motivadora de emagrecimento. Analise os últimos 7 registros desta pessoa e gere um feedback semanal em português, motivador, específico e prático (máximo 3 parágrafos curtos). Destaque conquistas, aponte 1 padrão a melhorar e dê 2 dicas concretas para a próxima semana. Dados:\n\n${JSON.stringify(resumo, null, 2)}`;
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      if (!resp.ok) {
        const err = await resp.text();
        throw new Error(err);
      }
      const json = await resp.json();
      const texto = json.content?.[0]?.text || 'Sem resposta';
      await analisesApi.add(texto);
    } catch (e) {
      console.error(e);
      setErro(e.message);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="space-y-3 pb-4">
      <Card>
        <div className="text-sm font-medium text-gray-700 mb-2">🔑 API Key Anthropic</div>
        <input type="password" value={apiKey} onChange={e => saveKey(e.target.value)}
          placeholder="sk-ant-..."
          className="w-full px-3 py-2 rounded-xl border border-rose-200 bg-white focus:outline-none focus:ring-2 focus:ring-rose-300"/>
        <div className="text-xs text-gray-500 mt-1">Armazenada apenas no sessionStorage (expira ao fechar a aba).</div>
      </Card>

      <button onClick={gerar} disabled={loading}
        className="w-full bg-gradient-to-r from-purple-500 to-rose-500 text-white py-3 rounded-2xl font-semibold shadow active:scale-95 disabled:opacity-50">
        {loading ? 'Analisando...' : '🧠 Gerar análise semanal'}
      </button>

      {erro && <Card className="bg-red-50 border-red-200 text-sm text-red-700">❌ {erro}</Card>}

      <div className="space-y-2">
        {analises.map(a => (
          <Card key={a.id}>
            <div className="flex justify-between items-start mb-1">
              <div className="text-xs text-gray-500">{formatBR(a.data)}</div>
              <button onClick={() => { if (confirm('Excluir?')) analisesApi.remove(a.id); }} className="text-gray-400 hover:text-red-500"><ITrash className="w-4 h-4"/></button>
            </div>
            <div className="text-sm text-gray-800 whitespace-pre-wrap">{a.conteudo}</div>
          </Card>
        ))}
        {analises.length === 0 && <div className="text-center text-gray-400 text-sm py-4">Nenhuma análise ainda</div>}
      </div>
    </div>
  );
}

/* ================== CHECK-IN MODAL ================== */
function CheckinModal({ open, onClose, data }) {
  const { pesosApi, treinosApi, hidratacaoApi, suplementos, suplementosApi } = data;
  const [peso, setPeso] = useState('');
  const [fazTreino, setFazTreino] = useState(false);
  const [tipoTreino, setTipoTreino] = useState('Musculação');
  const [outroTipo, setOutroTipo] = useState('');
  const [duracao, setDuracao] = useState(40);
  const [outroDur, setOutroDur] = useState(false);
  const [agua, setAgua] = useState('');
  const [selSup, setSelSup] = useState({});

  useEffect(() => {
    if (open) {
      setPeso(''); setFazTreino(false); setTipoTreino('Musculação'); setOutroTipo(''); setDuracao(40); setOutroDur(false); setAgua(''); setSelSup({});
    }
  }, [open]);

  const supsUnicos = useMemo(() => {
    const mapa = {};
    suplementos.forEach(s => { if (!mapa[s.nome]) mapa[s.nome] = s; });
    return Object.values(mapa);
  }, [suplementos]);

  async function salvar() {
    const ops = [];
    const hoje = todayStr();
    if (peso) ops.push(pesosApi.add({ data: hoje, peso: parseFloat(peso.replace(',','.')) }));
    if (fazTreino && duracao) {
      const tipo = tipoTreino === 'Outro' ? outroTipo : tipoTreino;
      if (tipo) ops.push(treinosApi.add({ data: hoje, tipo, duracao: parseInt(duracao) }));
    }
    if (agua) ops.push(hidratacaoApi.add({ data: hoje, ml: parseInt(agua) }));
    Object.entries(selSup).forEach(([nome, ativo]) => {
      if (ativo) {
        const modelo = supsUnicos.find(s => s.nome===nome);
        ops.push(suplementosApi.add({ data: hoje, nome, dose: modelo?.dose || '', horario: modelo?.horario || '' }));
      }
    });
    await Promise.all(ops);
    onClose();
  }

  if (!open) return null;

  return (
    <div className="fixed inset-0 z-50 bg-black/40 flex items-end justify-center" onClick={onClose}>
      <div className="bg-white rounded-t-3xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-slideup" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b border-rose-100 flex justify-between items-center sticky top-0 bg-white">
          <h2 className="text-lg font-bold text-rose-600">⚡ Check-in rápido</h2>
          <button onClick={onClose} className="p-1"><IX className="w-5 h-5"/></button>
        </div>
        <div className="p-4 space-y-4">
          {/* Peso */}
          <div>
            <label className="text-sm font-medium text-gray-700">⚖️ Peso (kg)</label>
            <NumberInput value={peso} onChange={setPeso} placeholder="ex: 85.3" className="w-full mt-1"/>
          </div>

          {/* Treino */}
          <div>
            <label className="flex items-center gap-2 text-sm font-medium text-gray-700">
              <input type="checkbox" checked={fazTreino} onChange={e => setFazTreino(e.target.checked)} className="w-4 h-4 accent-rose-500"/>
              🏋️ Fiz treino hoje
            </label>
            {fazTreino && (
              <div className="mt-2 space-y-2 pl-6">
                <div className="flex gap-2 flex-wrap">
                  {['Musculação','Pilates','Natação'].map(t => (
                    <button key={t} onClick={() => setTipoTreino(t)}
                      className={`px-3 py-1 rounded-xl text-xs ${tipoTreino===t ? 'bg-rose-500 text-white' : 'bg-rose-100 text-rose-700'}`}>{t}</button>
                  ))}
                </div>
                <select value={tipoTreino} onChange={e => setTipoTreino(e.target.value)} className="w-full px-3 py-2 rounded-xl border border-rose-200 text-sm">
                  {MODALIDADES.map(m => <option key={m}>{m}</option>)}
                </select>
                {tipoTreino === 'Outro' && <TextInput value={outroTipo} onChange={setOutroTipo} placeholder="Ex: Spinning" className="w-full"/>}
                <div className="flex gap-2 flex-wrap items-center">
                  {[40,50,60].map(d => (
                    <button key={d} onClick={() => { setDuracao(d); setOutroDur(false); }}
                      className={`px-3 py-1 rounded-xl text-xs ${duracao==d && !outroDur ? 'bg-rose-500 text-white' : 'bg-rose-100 text-rose-700'}`}>{d}min</button>
                  ))}
                  <button onClick={() => setOutroDur(true)} className={`px-3 py-1 rounded-xl text-xs ${outroDur ? 'bg-rose-500 text-white' : 'bg-rose-100 text-rose-700'}`}>outro</button>
                  {outroDur && <NumberInput step="1" value={duracao} onChange={setDuracao} placeholder="min" className="w-20"/>}
                </div>
              </div>
            )}
          </div>

          {/* Água */}
          <div>
            <label className="text-sm font-medium text-gray-700">💧 Água (ml)</label>
            <NumberInput step="1" value={agua} onChange={setAgua} placeholder="ml" className="w-full mt-1"/>
            <div className="flex gap-1 flex-wrap mt-2">
              {[500,1000,1500,2000,3000,3500,4000,4500].map(v => (
                <button key={v} onClick={() => setAgua(String(v))}
                  className="px-2 py-1 rounded-lg text-xs bg-sky-100 text-sky-700">{v>=1000?`${v/1000}L`:`${v}ml`}</button>
              ))}
            </div>
          </div>

          {/* Suplementos */}
          {supsUnicos.length > 0 && (
            <div>
              <label className="text-sm font-medium text-gray-700">🌿 Suplementos</label>
              <div className="flex gap-2 flex-wrap mt-2">
                {supsUnicos.map(s => {
                  const on = selSup[s.nome];
                  return (
                    <button key={s.nome} onClick={() => setSelSup({...selSup, [s.nome]: !on})}
                      className={`px-3 py-1.5 rounded-xl text-sm ${on ? 'bg-green-500 text-white' : 'bg-green-100 text-green-700'}`}>
                      {on ? '✓ ' : ''}{s.nome}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          <button onClick={salvar} className="w-full bg-gradient-to-r from-rose-500 to-pink-500 text-white py-3 rounded-2xl font-bold shadow active:scale-95">
            Salvar check-in
          </button>
        </div>
      </div>
    </div>
  );
}

/* ================== APP ================== */
function App() {
  const data = useJornadaData();
  const [tab, setTab] = useState('visao');
  const [checkinOpen, setCheckinOpen] = useState(false);

  if (data.loading) {
    return (
      <div className="flex items-center justify-center min-h-screen">
        <div className="text-rose-500 text-lg">🌸 Carregando sua jornada...</div>
      </div>
    );
  }

  if (data.error) {
    return (
      <div className="flex items-center justify-center min-h-screen p-4">
        <Card className="max-w-md text-center">
          <div className="text-red-500 font-bold mb-2">Erro ao conectar</div>
          <div className="text-sm text-gray-600">{data.error}</div>
          <button onClick={data.reload} className="mt-4 bg-rose-500 text-white px-4 py-2 rounded-xl">Tentar novamente</button>
        </Card>
      </div>
    );
  }

  const pesoAtual = data.pesos.length ? data.pesos[data.pesos.length-1].peso : PESO_INICIAL;
  const progresso = Math.min(100, Math.max(0, ((PESO_INICIAL - pesoAtual) / (PESO_INICIAL - PESO_META)) * 100));

  const TabComponent = {
    visao:   () => <VisaoGeral data={data} setTab={setTab} onCheckin={() => setCheckinOpen(true)}/>,
    semanas: () => <Semanas data={data}/>,
    peso:    () => <PesoTab data={data}/>,
    treinos: () => <TreinosTab data={data}/>,
    agua:    () => <HidratacaoTab data={data}/>,
    medic:   () => <MedicacaoTab data={data}/>,
    suplem:  () => <SuplementosTab data={data}/>,
    ia:      () => <AnaliseIATab data={data}/>
  }[tab];

  const currentTab = TABS.find(t => t.id === tab);

  return (
    <div className="max-w-lg mx-auto">
      {/* Header fixo */}
      <div className="sticky top-0 z-40 bg-gradient-to-r from-rose-100 via-pink-100 to-rose-100 backdrop-blur border-b border-rose-200 shadow-sm">
        <div className="px-4 py-3">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-lg font-bold text-rose-700">🌸 Minha Jornada</h1>
              <div className="text-xs text-rose-500">{currentTab?.icon} {currentTab?.label}</div>
            </div>
            <button onClick={() => setCheckinOpen(true)}
              className="bg-gradient-to-r from-rose-500 to-pink-500 text-white px-3 py-2 rounded-xl text-sm font-semibold shadow active:scale-95 flex items-center gap-1">
              <IZap className="w-4 h-4"/> Check-in
            </button>
          </div>
          {/* Barra de progresso */}
          <div className="mt-2">
            <div className="flex justify-between text-xs text-rose-600 mb-1">
              <span>{parseFloat(pesoAtual).toFixed(1)}kg</span>
              <span>{progresso.toFixed(0)}%</span>
              <span>{PESO_META}kg</span>
            </div>
            <div className="h-2 bg-white/60 rounded-full overflow-hidden">
              <div className="h-full bg-gradient-to-r from-rose-400 to-pink-500 transition-all" style={{ width: `${progresso}%` }}/>
            </div>
          </div>
        </div>
      </div>

      {/* Conteúdo */}
      <div className="px-3 pt-3 pb-24">
        <TabComponent/>
      </div>

      {/* Bottom nav */}
      <div className="fixed bottom-0 left-0 right-0 z-40 bg-white/95 backdrop-blur border-t border-rose-200">
        <div className="max-w-lg mx-auto flex overflow-x-auto no-scrollbar">
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`flex-1 min-w-[60px] flex flex-col items-center py-2 px-1 text-[10px] ${tab===t.id ? 'text-rose-600 font-semibold' : 'text-gray-500'}`}>
              <div className="text-lg leading-none">{t.icon}</div>
              <div className="mt-0.5 truncate">{t.label.split(' ')[0]}</div>
            </button>
          ))}
        </div>
      </div>

      <CheckinModal open={checkinOpen} onClose={() => setCheckinOpen(false)} data={data}/>
    </div>
  );
}

/* ================== MOUNT ================== */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
